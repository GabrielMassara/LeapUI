<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
    <!-- Background circle -->
    <circle cx="64" cy="64" r="60" fill="url(#gradient)" stroke="#fff" stroke-width="4"/>
    
    <!-- Gradient definition -->
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <!-- Magnifying glass handle -->
    <line x1="85" y1="85" x2="105" y2="105" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Magnifying glass circle -->
    <circle cx="70" cy="70" r="25" fill="none" stroke="#fff" stroke-width="5"/>
    
    <!-- Cross hair inside magnifying glass -->
    <line x1="58" y1="70" x2="82" y2="70" stroke="#fff" stroke-width="2" opacity="0.8"/>
    <line x1="70" y1="58" x2="70" y2="82" stroke="#fff" stroke-width="2" opacity="0.8"/>
    
    <!-- Selection box indicator -->
    <rect x="55" y="55" width="30" height="20" fill="none" stroke="#ff4444" stroke-width="2" stroke-dasharray="3,2" opacity="0.9"/>
</svg>